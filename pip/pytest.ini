[pytest]
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
testpaths = tests
markers =
    priority_high: High priority test cases
    priority_medium: Medium priority test cases
    priority_low: Low priority test cases
    functional: Functional test cases
    regression: Regression test cases
    smoke: Smoke test cases
    testcase_2215: Test case ID 2215
